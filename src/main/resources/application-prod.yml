spring:

  # ── DataSource (env vars) ─────────────────────────────────────────────────
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: 4guard-prod-pool
      maximum-pool-size: 6
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: false

  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: wms
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
          batch_size: 100
        order_inserts: true
        order_updates: true

  # ── Flyway ────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: wms
    default-schema: wms
    create-schemas: true
    baseline-on-migrate: false
    out-of-order: false

  # ── Redis ─────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      connect-timeout: 2000ms

# ── Cache (Redis activo en prod si se define la variable) ─────────────────────
cache:
  redis:
    enabled: ${REDIS_ENABLED:false}

# ── JWT ───────────────────────────────────────────────────────────────────────
security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:1800000}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:1800000}
    password-reset-token-expiration: ${JWT_RESET_EXPIRATION:900000}

# ── Server ────────────────────────────────────────────────────────────────────
server:
  error:
    include-message: never
    include-stacktrace: never

# ── Logging (prod — mínimo) ───────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.fourguard.wms: INFO
    org.flywaydb: WARN
