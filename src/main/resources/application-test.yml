spring:
  datasource:
    url: jdbc:h2:mem:wms_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS wms
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        default_schema: wms
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379

cache:
  redis:
    enabled: false

security:
  jwt:
    secret: "4guard-test-secret-key-static-for-unit-tests-only-never-use-in-production"
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000
    password-reset-token-expiration: 900000

logging:
  level:
    com.fourguard.wms: DEBUG
    org.springframework.security: DEBUG
