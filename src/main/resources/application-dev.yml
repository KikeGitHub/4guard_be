spring:

  # ── DataSource ───────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/4guard_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: 4guard-dev-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: false

  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    open-in-view: false          # Anti-patrón desactivado — arquitectura hexagonal
    hibernate:
      ddl-auto: validate         # BD gestionada 100% por Flyway
    show-sql: false
    properties:
      hibernate:
        default_schema: wms
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ── Flyway ────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: wms
    default-schema: wms
    create-schemas: true
    baseline-on-migrate: true
    out-of-order: false
    validate-on-migrate: true

  # ── Redis (opcional en dev — activo si se levanta un contenedor local) ────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      connect-timeout: 2000ms

# ── JWT ───────────────────────────────────────────────────────────────────────
security:
  jwt:
    secret: "4GUARD-WMS-dev-secret-key-for-local-development-only-256bits-minimum-length"
    access-token-expiration: 3600000      # 1 hora (ms)
    refresh-token-expiration: 604800000   # 7 días (ms)
    password-reset-token-expiration: 900000 # 15 minutos (ms)

# ── Logging (dev — verbose) ───────────────────────────────────────────────────
logging:
  level:
    com.fourguard.wms: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: INFO
